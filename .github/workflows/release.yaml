name: 'lb3'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure CMake
        run: cmake -B build .

      - name: Build project
        run: cmake --build build

      - name: Show .so file
        run: find build -name "*.so" -type f

      - name: Run test
        run: ./build/Meloman

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-library
          path: build/*.so
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure CMake
        run: cmake -B build .
      - name: Build project
        run: cmake --build build --config Release

      - name: List build directory
        run: Get-ChildItem -Recurse build/ -Filter *.dll | Select-Object FullName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-library
          path: build/Release/*.dll
          if-no-files-found: error
